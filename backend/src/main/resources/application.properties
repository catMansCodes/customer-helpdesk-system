# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=customer-helpdesk-system
# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
# ── DataSource (MySQL 8) ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/help_desk_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=HelpDeskPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
# ── Spring AI — Google Gemini (free tier via Google AI Studio) ────────────────
spring.ai.google.genai.api-key=${GOOGLE_AI_API_KEY:AIzaSyCRm3TMR1nkUwH9KI2JGEYumtRsXphuUks}
spring.ai.google.genai.chat.options.model=gemini-2.0-flash
spring.ai.google.genai.chat.options.temperature=0.7
# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:changeme-use-a-long-random-string-in-production}
app.jwt.expiration-ms=86400000
# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:4200


